<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isso Não É Um Jogo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a2e;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow: hidden;
        }

        /* --- TELA DE LOGIN --- */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #2c3e50;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 80vw;
            max-width: 300px;
            text-align: center;
        }
        .login-container h2 {
            color: white;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .login-container input {
            padding: 15px;
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
            width: 90%;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }
        .login-container button {
            padding: 12px 30px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            width: 90%;
        }
        .login-container button:hover {
            background-color: #c0392b;
        }
        #mensagem-erro {
            color: #ff7675;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            font-weight: bold;
        }

        /* --- TELA DO JOGO --- */
        .tela-jogo {
            display: none;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }
        
        /* Contador de cartas para vocês saberem quantas faltam */
        .contador {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .card-container {
            width: 85vw;
            max-width: 350px;
            height: 60vh;
            max-height: 550px;
            perspective: 1000px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-radius: 20px;
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 20px;
            text-align: center;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .card-front {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            color: white;
            font-size: 28px;
            font-weight: bold;
            border: 4px solid #fff;
        }
        .card-back {
            transform: rotateY(180deg);
            border: 4px solid #fff;
        }
        .theme-confianca { background-color: #f1c40f; border-color: #f39c12; }
        .theme-confianca .categoria { color: #d35400; }
        .theme-confianca .pergunta { color: #2c3e50; }

        .theme-coragem { background-color: #e74c3c; border-color: #c0392b; }
        .theme-coragem .categoria { color: #fadbd8; }
        .theme-coragem .pergunta { color: #ffffff; }

        .theme-revelacao { background-color: #8e44ad; border-color: #732d91; }
        .theme-revelacao .categoria { color: #e8daef; }
        .theme-revelacao .pergunta { color: #ffffff; }

        .theme-construcao { background-color: #2980b9; border-color: #1f618d; }
        .theme-construcao .categoria { color: #d4e6f1; }
        .theme-construcao .pergunta { color: #ffffff; }

        .categoria {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: bold;
            transition: color 0.3s;
        }
        .pergunta {
            font-size: 22px;
            font-weight: 600;
            line-height: 1.4;
            transition: color 0.3s;
        }
        .instrucao {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: normal;
        }
    </style>
</head>

        <input type="password" id="senha-input" placeholder="Digite a senha..." />
        <button onclick="verificarSenha()">Destravar</button>
        <p id="mensagem-erro">Senha incorreta. Tente de novo!</p>

                </div>
                <div class="card-face card-back" id="card-back">
                    <div class="categoria" id="categoria-texto">Categoria</div>
                    <div class="pergunta" id="pergunta-texto">A pergunta aparecerá aqui.</div>
                </div>
            </div>
        </div>
    </div>

            const erro = document.getElementById("mensagem-erro");

            if (btoa(input) === SENHA_CODIFICADA) {
                document.getElementById("tela-login").style.display = "none";
                document.getElementById("tela-jogo").style.display = "flex";
            } else {
                erro.style.display = "block";
            }
        }

            if (event.key === "Enter") {
                event.preventDefault();
                verificarSenha();

        let isFlipped = false;
        let cartasDisponiveis = [];

        // Lógica de Memória (LocalStorage)
        function inicializarBaralho() {
            const salvas = localStorage.getItem('cartas_jogo_date');
            
            if (salvas) {
                cartasDisponiveis = JSON.parse(salvas);
            }
            
            // Se for a primeira vez jogando ou se acabaram as cartas
            if (!salvas || cartasDisponiveis.length === 0) {
                reiniciarBaralho();
            }
            
            atualizarContador();
        }

        function reiniciarBaralho() {
            // Cria um array com os números de 0 até o total de cartas
            cartasDisponiveis = deck.map((_, index) => index);
            localStorage.setItem('cartas_jogo_date', JSON.stringify(cartasDisponiveis));
        }

        function atualizarContador() {
            document.getElementById('contador-texto').innerText = `Cartas no baralho: ${cartasDisponiveis.length}`;
        }

        // Chama a função ao carregar o script
        inicializarBaralho();

        function flipCard() {
            const card = document.getElementById('myCard');
            const cardBack = document.getElementById('card-back');
            const categoriaEl = document.getElementById('categoria-texto');
            const perguntaEl = document.getElementById('pergunta-texto');

            if (!isFlipped) {
                // Se as cartas acabarem bem na hora do clique
                if (cartasDisponiveis.length === 0) {
                    alert("Vocês já responderam todas as perguntas! O baralho vai ser embaralhado novamente. 🔄");
                    reiniciarBaralho();
                }

                // Sorteia um índice aleatório DENTRO das cartas que ainda restam
                const indexAleatorio = Math.floor(Math.random() * cartasDisponiveis.length);
                const indexNoDeck = cartasDisponiveis[indexAleatorio];
                const randomCard = deck[indexNoDeck];

                // Remove a carta que acabou de sair da lista de disponíveis
                cartasDisponiveis.splice(indexAleatorio, 1);
                
                // Salva a nova lista no navegador e atualiza o número na tela
                localStorage.setItem('cartas_jogo_date', JSON.stringify(cartasDisponiveis));
                atualizarContador();
                
                // Aplica os textos e cores
                categoriaEl.innerText = randomCard.cat;
                perguntaEl.innerText = randomCard.text;

                cardBack.classList.remove('theme-confianca', 'theme-coragem', 'theme-revelacao', 'theme-construcao');
                
                if (randomCard.cat === "CONFIANÇA") {
                    cardBack.classList.add('theme-confianca');
                } else if (randomCard.cat === "CORAGEM") {
                    cardBack.classList.add('theme-coragem');
                } else if (randomCard.cat === "REVELAÇÃO") {
                    cardBack.classList.add('theme-revelacao');
                } else if (randomCard.cat === "CONSTRUÇÃO") {
                    cardBack.classList.add('theme-construcao');
                }
                
                card.classList.add('is-flipped');
            } else {
                card.classList.remove('is-flipped');
            }
            
            isFlipped = !isFlipped;
        }
    </script>
</body>
</html>
